name: Testing Data Loop Contract Validation

on:
  push:
    paths:
      - 'docs/TESTING_DATA_LOOP_CONTRACT.md'
      - '.github/workflows/testing-data-loop-contract-validate.yml'
  pull_request:
    paths:
      - 'docs/TESTING_DATA_LOOP_CONTRACT.md'
      - '.github/workflows/testing-data-loop-contract-validate.yml'
  workflow_dispatch:

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required terms
        run: |
          grep -q 'StegVerse-org/StegVerse-SDK or LLM Adapter' docs/TESTING_DATA_LOOP_CONTRACT.md
          grep -q 'StegGhost/entity-sandbox-runner ingestion/CGE' docs/TESTING_DATA_LOOP_CONTRACT.md
          grep -q 'ephemeral sandbox batch' docs/TESTING_DATA_LOOP_CONTRACT.md
          grep -q 'master-records action receipt references' docs/TESTING_DATA_LOOP_CONTRACT.md
          grep -q 'formal-testing-route-result.schema.json' docs/TESTING_DATA_LOOP_CONTRACT.md
