name: Run Demo Suite

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: true
        default: 'execution_governance'
        type: choice
        options:
          - execution_governance
          - mutation_governance
          - governance_matrix
          - governance_random_sweep
          - full
      reset:
        description: 'Reset mode'
        required: true
        default: 'hard'
        type: choice
        options:
          - soft
          - hard
      seed:
        description: 'Random seed (for governance_random_sweep only)'
        required: false
        default: '42'
        type: string
      samples:
        description: 'Samples per phase (for governance_random_sweep only)'
        required: false
        default: '50'
        type: string
      reconstruct:
        description: 'Run reconstruction and confidence analysis'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clear cache
        run: |
          rm -rf scripts/__pycache__ scripts/*.pyc
          git checkout -- scripts/
          git pull origin main

      
      - name: Run demo suite
        run: |
          RECON_FLAG=""
          if [ "${{ github.event.inputs.reconstruct }}" == "false" ]; then
            RECON_FLAG="--no-reconstruct"
          fi
          
          if [ "${{ github.event.inputs.mode }}" == "governance_random_sweep" ]; then
            python runner/main.py --mode ${{ github.event.inputs.mode }} --reset ${{ github.event.inputs.reset }} --seed ${{ github.event.inputs.seed }} --samples ${{ github.event.inputs.samples }} $RECON_FLAG
          else
            python runner/main.py --mode ${{ github.event.inputs.mode }} --reset ${{ github.event.inputs.reset }} $RECON_FLAG
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-run-${{ github.event.inputs.mode }}-${{ github.run_id }}
          path: |
            runs/
            reports/
