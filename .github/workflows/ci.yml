name: StegVerse Formalism Sandbox CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 0"  # Weekly Sunday midnight
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  sandbox-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install numpy
          pip install pytest

      - name: Run GCAT Invariant Tests
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from invariants.gcat_invariants import GCATInvariants
          gcat = GCATInvariants()

          r1 = gcat.check_simplex_non_negativity([1.0, 2.0, 3.0])
          assert r1.passed, f'I1 should pass: {r1.reasoning}'
          print(f'PASS: I1 — {r1.reasoning}')

          r1_fail = gcat.check_simplex_non_negativity([1.0, -1.0, 3.0])
          assert not r1_fail.passed, f'I1 should fail: {r1_fail.reasoning}'
          print(f'PASS: I1 fail — {r1_fail.reasoning}')

          r2 = gcat.check_triangle_inequality([(3.0, 4.0, 5.0)])
          assert r2.passed, f'I2 should pass: {r2.reasoning}'
          print(f'PASS: I2 — {r2.reasoning}')

          r2_fail = gcat.check_triangle_inequality([(1.0, 1.0, 3.0)])
          assert not r2_fail.passed, f'I2 should fail: {r2_fail.reasoning}'
          print(f'PASS: I2 fail — {r2_fail.reasoning}')

          r4 = gcat.check_admissibility_scalar_bounds(0.5)
          assert r4.passed, f'I4 should pass: {r4.reasoning}'
          print(f'PASS: I4 — {r4.reasoning}')

          r4_fail = gcat.check_admissibility_scalar_bounds(1.5)
          assert not r4_fail.passed, f'I4 should fail: {r4_fail.reasoning}'
          print(f'PASS: I4 fail — {r4_fail.reasoning}')

          print('\n=== ALL GCAT TESTS PASSED ===')
          "

      - name: Run BCAT Boundary Tests
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from invariants.bcat_invariants import BCATInvariants
          bcat = BCATInvariants()

          b1_warn = bcat.check_boundary_proximity(0.05)
          assert b1_warn.metadata['status'] == 'WARNING', f'B1 should warn: {b1_warn.reasoning}'
          print(f'PASS: B1 warning — {b1_warn.reasoning}')

          b1_safe = bcat.check_boundary_proximity(0.5)
          assert b1_safe.metadata['status'] == 'SAFE', f'B1 should be safe: {b1_safe.reasoning}'
          print(f'PASS: B1 safe — {b1_safe.reasoning}')

          b3 = bcat.check_edge_collapse([1e-12, 1.0, 1.0])
          assert b3.metadata['status'] == 'COLLAPSED', f'B3 should detect collapse: {b3.reasoning}'
          print(f'PASS: B3 collapse — {b3.reasoning}')

          print('\n=== ALL BCAT TESTS PASSED ===')
          "

      - name: Run Ephemeral Sandbox
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from sandbox.ephemeral_sandbox import EphemeralSandbox

          sandbox = EphemeralSandbox(seed='ci-test', experiment_name='ci')

          result = sandbox.run_experiment({
              'test_simplex': True,
              'dimension': 3,
              'test_admissibility': True,
              'boundary_proximity': 'none'
          })

          assert result.aggregate['total_invariants'] > 0, 'No invariants run'
          print(f'PASS: Sandbox — {result.experiment_id}')
          print(f'      Pass rate: {result.aggregate["pass_rate"]:.1%}')

          # Verify ephemeral cleanup
          import tempfile, os
          temp_dirs = [d for d in os.listdir(tempfile.gettempdir()) if d.startswith('stegverse_sandbox_')]
          assert len(temp_dirs) == 0, f'Ephemeral leak: {temp_dirs}'
          print('PASS: Ephemeral cleanup verified')

          print('\n=== SANDBOX TESTS PASSED ===')
          "

      - name: Run Experiment Suite & Export
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from experiments.experiment_suite import ExperimentSuites

          suites = ExperimentSuites(base_seed='ci-quick')
          results = suites.suite_edge_collapse_convergence(num_steps=5)

          print(f'\nSuite completed: {len(results)} experiments')

          # Export for artifact upload
          suites.export_results('formalism_exploration_results.json')
          print('Results exported for upload')
          "

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-results
          path: formalism_exploration_results.json
        if: always()
