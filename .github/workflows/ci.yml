name: Demo Suite Runner CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  STEGVERSE_SEED: "ci-deterministic-seed-2026"

jobs:
  cache-clear:
    runs-on: ubuntu-latest
    steps:
      - name: Clear All Caches
        run: |
          rm -rf .pytest_cache __pycache__ */__pycache__ .mypy_cache
          echo "Cache cleared for run: ${{ github.run_id }}"

  receipt-id-tests:
    needs: cache-clear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test Receipt ID Determinism
        run: |
          cd scripts
          python -c "
          from receipt_id import init_session, get_receipt, reset_session, ReceiptGenerator
          reset_session()
          init_session('test-seed-001', 'deterministic')
          r1 = get_receipt({'action': 'test'}, 'GCAT')
          assert r1.startswith('REC-GCAT-'), f'Bad format: {r1}'
          r2 = get_receipt({'action': 'test'}, 'GCAT')
          assert r1 != r2, f'Collision: {r1} == {r2}'
          r3 = get_receipt({'action': 'other'}, 'BCAT')
          assert r3.startswith('REC-BCAT-')
          gen = ReceiptGenerator('val-seed')
          assert gen.validate_format('REC-GCAT-123-abc')
          assert not gen.validate_format('BAD-FORMAT')
          print('=== RECEIPT ID TESTS PASSED ===')
          "

  governed-action-tests:
    needs: cache-clear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test Gate Logic
        run: |
          cd scripts
          python -c "
          from receipt_id import reset_session, init_session
          from governed_action import create_gate, GateResult
          reset_session()
          init_session('gate-test', 'deterministic')
          gate = create_gate('GCAT')
          result = gate.evaluate({'action': 'query', 'payload': {'data': 'test'}})
          assert result['receipt_id'].startswith('REC-')
          assert result['result'] == GateResult.ALLOW
          assert 0 <= result['confidence'] <= 1
          assert len(result['reasoning']) > 0
          result2 = gate.evaluate({'invalid': 'input'})
          assert result2['result'] == GateResult.FAIL_CLOSED
          assert result2['receipt_id'].startswith('REC-')
          assert len(gate.history) >= 2
          print('=== GOVERNED ACTION TESTS PASSED ===')
          "

  governed-mutation-tests:
    needs: cache-clear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test Mutation Logic
        run: |
          cd scripts
          python -c "
          from receipt_id import reset_session, init_session
          from governed_action import create_gate
          from governed_mutation import GovernedMutation
          reset_session()
          init_session('mutation-test', 'deterministic')
          gate = create_gate('GCAT')
          mutator = GovernedMutation(gate, {'key1': 'initial_value'})
          result = mutator.mutate('update', 'key1', 'new_value')
          assert result['receipt_id'].startswith('REC-')
          if result['result'].value == 'ALLOW':
              assert mutator.get_state_snapshot()['key1'] == 'new_value'
              success = mutator.rollback(result['receipt_id'])
              assert success
              assert mutator.get_state_snapshot()['key1'] == 'initial_value'
          query_result = mutator.query('key1')
          assert query_result['receipt_id'].startswith('REC-')
          assert len(mutator.mutation_log) > 0
          print('=== GOVERNED MUTATION TESTS PASSED ===')
          "

  llm-adapter-tests:
    needs: cache-clear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test Adapter Structure
        run: |
          cd scripts
          python -c "
          from llm_adapter import LLMConfig, ProviderType, LLMAdapter, create_adapter, LLMResponse
          config = LLMConfig(provider=ProviderType.LOCAL, model='llama2')
          assert config.provider == ProviderType.LOCAL
          assert config.temperature == 0.0
          assert ProviderType.OPENAI.value == 'openai'
          assert ProviderType.KIMI.value == 'kimi'
          adapter = create_adapter('local', 'test-model')
          assert adapter.config.provider == ProviderType.LOCAL
          assert adapter.budget_used == 0.0
          resp = LLMResponse('test', 'REC-TEST', ProviderType.LOCAL, 'm', {}, 0.5, 'reason')
          d = resp.to_dict()
          assert d['content'] == 'test'
          assert d['confidence'] == 0.5
          print('=== LLM ADAPTER TESTS PASSED ===')
          "

  demo-runner-tests:
    needs: cache-clear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run Full Demo Suite
        run: |
          cd scripts
          python demo_suite_runner.py --seed "${{ env.STEGVERSE_SEED }}" --tests 5 --mode deterministic --output ../demo_result.json
      - name: Validate Output
        run: |
          python -c "
          import json
          with open('demo_result.json') as f:
              data = json.load(f)
          assert 'seed' in data
          assert 'total_tests' in data
          total = data['total_tests']
          allow = data['allow_count']
          deny = data['deny_count']
          fail = data['fail_closed_count']
          assert total == allow + deny + fail
          assert data['statistics']['determinism_check']['collision_free']
          pass_nums = [r['pass_num'] for r in data['results']]
          assert 1 in pass_nums and 2 in pass_nums and 3 in pass_nums
          print(f'Total={total}, ALLOW={allow}, DENY={deny}, FAIL={fail}')
          print('=== DEMO SUITE OUTPUT VALIDATED ===')
          "
      - name: Upload Demo Results
        uses: actions/upload-artifact@v4
        with:
          name: demo-results
          path: demo_result.json

  collect:
    needs: [receipt-id-tests, governed-action-tests, governed-mutation-tests, llm-adapter-tests, demo-runner-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true
      - name: Summary
        run: |
          echo "=== StegVerse Demo Suite CI Summary ==="
          echo "Run ID: ${{ github.run_id }}"
          ls -la all-artifacts/
